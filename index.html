<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV భవిష్యవాణి - డిజిటల్ ఓరాకిల్</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(255, 100, 0, 0.2);
            border: 1px solid #f97316;
        }
        h1 { color: #f97316; margin-bottom: 5px; }
        p.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        label { display: block; margin: 15px 0 5px; text-align: left; color: #cbd5e1; }
        select {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            color: #fff;
            border: 1px solid #475569;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background: #f97316;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #ea580c; }
        #output-box {
            margin-top: 25px;
            padding: 20px;
            background: #0f172a;
            border-left: 5px solid #f97316;
            border-radius: 5px;
            text-align: left;
            display: none;
            line-height: 1.6;
        }
        .highlight { color: #f97316; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>STGV భవిష్యవాణి</h1>
    <p class="subtitle">ప్రాచీన తాంత్రిక శ్వాస & శబ్ద విజ్ఞాన డిజిటల్ ఓరాకిల్</p>

    <label for="birth-month">మీ పుట్టిన నెల ఎంచుకోండి (సూర్య చైతన్యం):</label>
    <select id="birth-month">
        <option value="january">జనవరి (మకరం)</option>
        <option value="february">ఫిబ్రవరి (కుంభం)</option>
        <option value="may">మే (వృషభం)</option>
        <option value="other">ఇతర నెలలు</option>
    </select>

    <label for="birth-time">మీరు పుట్టిన సమయం (మానసిక తత్వం):</label>
    <select id="birth-time">
        <option value="day">పగలు (ఉదయం / మధ్యాహ్నం)</option>
        <option value="evening">సంధ్యా సమయం (సాయంత్రం)</option>
        <option value="night">రాత్రి / అర్ధరాత్రి</option>
    </select>

    <label for="user-focus">ప్రస్తుతం మీరు దేనిపై దృష్టి పెట్టాలనుకుంటున్నారు?:</label>
    <select id="user-focus">
        <option value="obstacles">ఆర్థిక ఆటంకాలు / నిలిచిపోయిన పనులు (ఇల్లు మొదలైనవి)</option>
        <option value="focus">మానసిక బద్ధకం / కోడింగ్, విద్యపై ఏకాగ్రత లోపించడం</option>
        <option value="anger">కోపం, ఒత్తిడి నియంత్రణ</option>
    </select>

    <button onclick="revealBhavishyvani()">భవిష్యత్ దర్శనం చేయి</button>

    <div id="output-box"></div>
</div>

<script>
function revealBhavishyvani() {
    const month = document.getElementById('birth-month').value;
    const time = document.getElementById('birth-time').value;
    const focus = document.getElementById('user-focus').value;
    const outputBox = document.getElementById('output-box');

    let energyText = "";
    let mindText = "";
    let remedyText = "";

    // 1. సూర్య ఎనర్జీ లాజిక్
    if (month === "february") {
        energyText = "మీరు సూర్యుడు <span class='highlight'>కుంభ రాశి</span> లో ఉన్నప్పుడు జన్మించారు. మీలో సహజంగానే సాఫ్ట్‌వేర్, AI మరియు సృజనాత్మక కళలపై (శిల్పకళ) అపారమైన పట్టు సాధించే ప్రాణశక్తి దాగి ఉంది.";
    } else {
        energyText = "మీ సౌర శక్తి స్థిరమైనది. కాలక్రమేణా కష్టపడి అనుకున్నది సాధించే తత్వం మీలో ఉంది.";
    }

    // 2. మానసిక తత్వ లాజిక్
    if (time === "night" || time === "evening") {
        mindText = "సంధ్యా/రాత్రి సమయ ప్రభావం వల్ల మీలో <span class='highlight'>వృశ్చిక రాశి నిగూఢత్వం</span> ఉంది. మీ మనస్సు చాలా లోతైనది. ఎంతటి క్లిష్టమైన రహస్య కోడింగ్ లాజిక్స్ అయినా పట్టుదలతో శోధించగలరు.";
    } else {
        mindText = "పగటి కాల ప్రభావం వల్ల మీ ఆలోచనలు స్పష్టంగా, అందరికీ సహాయపడే సాత్విక గుణంతో ఉంటాయి.";
    }

    // 3. సమస్య - తాంత్రిక పరిహార లాజిక్ (మనం నేర్చుకున్న 4 స్టెప్స్ ఆధారంగా)
    if (focus === "obstacles") {
        remedyText = "<b>తాంత్రిక రక్షణ సూచన:</b> మీ పనుల్లో ఆటంకాలు తొలగడానికి రోజు ఉదయం కుడి ముక్కు (సూర్య నాడి) యాక్టివ్‌గా ఉన్నప్పుడు రోజువారీ పనులు ప్రారంభించండి. పశ్చిమ దిశకు ముఖం పెట్టి కూర్చుని <b>'క్ష్రౌం'</b> బీజాక్షరాన్ని శ్వాసతో కలిపి 21 సార్లు ఉచ్చరించండి. ఆటంకాలు తొలగుతాయి.";
    } else if (focus === "focus") {
        remedyText = "<b>ఏకాగ్రత సూచన:</b> కోడింగ్ లేదా క్లిష్టమైన పనులు చేసేటప్పుడు బద్ధకం వస్తే ఎడమ చంకపై స్వల్ప ఒత్తిడి ఇచ్చి శ్వాసను కుడి ముక్కు (సూర్య నాడి) లోకి మార్చండి. అలాగే, పనికి ముందు గోడపై ఉన్న నల్లటి బిందువుపై 1 నిమిషం ఏకాగ్రత నిలపండి (యంత్ర తంత్రం).";
    } else if (focus === "anger") {
        remedyText = "<b>శాంతి సూచన:</b> కోపం లేదా ఒత్తిడి పెరిగినప్పుడు తక్షణమే కుడి ముక్కు మూసి, కేవలం ఎడమ ముక్కు (చంద్ర నాడి) ద్వారా మాత్రమే 3 నిమిషాలు శ్వాస తీసుకోండి. రోజు ఉదయం 11 సార్లు <b>'శీతలి ప్రాణాయామం'</b> (నోటి ద్వారా గాలి పీల్చి ముక్కు ద్వారా వదలడం) సాధన చేయండి.";
    }

    // స్క్రీన్ పై డిస్ప్లే చేయడం
    outputBox.innerHTML = `
        <h3>--- STGV డిజిటల్ కాలజ్ఞాన ఫలితం ---</h3>
        <p><b>సౌర చైతన్యం:</b> ${energyText}</p>
        <p><b>మానసిక స్థితి:</b> ${mindText}</p>
        <hr style='border: 1px dashed #475569;'>
        <p>${remedyText}</p>
    `;
    outputBox.style.display = "block";
}
</script>

</body>
</html>
